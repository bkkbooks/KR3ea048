body:
  text: 內經運氣表運氣之學非圖不明前人注內經者每於義難曉處間輔以圖宋劉溫舒素問入式運氣論奧為圖二十有九明張介賓分經為類謂之類經為圖四十有八附以論說致為詳贍惟圖說愈夥卒業愈難且有不能圖而宜於表者余故易圖為表但期於民病之因乎氣交及氣交之所以為治便於檢查而止故不取多焉作十三表五氣經天表第一內經五運行大論引太始天元冊文五氣之經天以著五行之合化蓋謂上有五色之分下臨十干之地而合十化五以各司其年者即此合化之五行非泛論五行之本氣不達乎此則知甲乙之為木而不知其為土與金知丙丁之為火而不知其為水與木知壬癸之為水而不知其為木與火知戊與辛之為土為金而不知其為火與水況十干之分陰分陽者且逐年而遞嬗耶故欲明五行之為運必先推五運之所自焉黅天之氣經於心尾己分黅天之色黃其氣土心尾在甲度而經中土己分故甲己合而化土甲陽土也己陰土也其在五音則為太宮少宮也素天之氣經於亢氐昴畢素天之色白其氣金亢氐在乙度而經昴畢庚度故乙庚合而化金乙陰金也庚陽金也其在五音則為少商太商也元天之氣經於張翼婁胃元天之色黑其氣水張翼在丙度而經婁胃辛度故丙辛合而化水丙陽水也辛陰水也其在五音則為太羽少羽也蒼天之氣經於危室柳鬼蒼天之色青其氣木危室在壬度而經柳鬼丁度故丁壬合而化木丁陰木也壬陽木也其在五音則為少角太角也丹天之氣經於牛女戊分丹天之色赤其氣火牛女在癸度而經中土戊分故戊癸合而化火戊陽火也癸陰火也其在五音則為太徵少徵也五行化為六氣表第二五行木火土金水也六氣風熱濕火燥寒為六經之本氣也天之五氣加臨地之五行五氣在天暑分火熱而為六五行在地火分君相亦為六人在氣交之中不能離此六氣氣得其常謂之經氣有變眚則為病風濕燥寒各居其一而惟火有二故病亦因火者多此人身不可有之火即人身不可無之火也然不可無之火不病也火而變為病人之火則所以治此火者自有道矣苟不言六經之本氣而但言手足之六經幾何不以病始太陽者謂其病獨在於膀胱小腸乎經曰治病必求於本此之謂也而與靈樞經脈經別經水三篇有不同也木為風氣厥陰風木應之入通於肝包絡火為暑氣又為熱少陰君火應之入通於心土為濕氣太陰濕土應之入通於脾火為火氣少陽相火應之入通於膽三焦金為燥氣陽明燥金應之入通於肺胃大腸水為寒氣太陽寒水應之入通於腎膀胱小腸五運合五音太少相生表第三凡數以少羽為一少徵為二少角為三少商為四少宮為五太羽為六太徵為七太角為八太商為九此五音太少之原也而以之論五行之化運則以宮商羽角徵為次如土為宮金為商水為羽木為角火為徵是也以之論五運之陰陽則以角徵宮商羽為次如陽木為太角陰木為少角陽火為太徵陰火為少徵陽土為太宮陰土為少宮陽金為太商陰金為少商陽水為太羽陰水為少羽是也以之論五行之中運則亦以宮商羽角徵為次如甲己土之皆為宮乙庚金之皆為商丙辛水之皆為羽丁壬木之皆為角戊癸火之皆為徵是也以之論年年不動之主運則亦以角徵宮商羽為次如陽年太角為初運少徵為二運太宮為三運少商為四運太羽為終運陰年少角為初運太徵為二運少宮為三運太商為四運少羽為終運是也以之論逐年加臨之客運則即以當年之中運為初運而仍以主運之太少為次如初運太角二運少徵三運太宮四運少商終運太羽又如初運太徵二運少宮三運太商四運少羽終運則不為太角而為少角者是也此五運司年及初終五步主客之大概也五運合五音太少相生表第三司天在泉左右間氣表第四六氣者厥陰風木少陰君火太陰濕土少陽相火陽明燥金太陽寒水之氣也司天在上在泉在下歲半以上司天主之歲半以下在泉主之六年而一周遍實三年而一環轉故於六年見風火而三年又見火風於六年見火燥而三年又見燥火於六年見濕寒而三年又見寒濕遂以成風熱濕火燥寒之六氣焉間氣者左右之道路天左間居地右之上天右間居地左之上泉左間居天右之下泉右間居天左之下而初終六氣隨之故六元正紀曰厥陰之政初氣陽明為右之下四氣少陰為左之上也欲知上下左右之位而以掌指輪之則中指尖為司天根為在泉食指尖為天左根為地右無名指尖為天右根為地左者其如示諸斯乎厥陰司天左少陰右太陽少陽在泉左陽明右太陰是為風火司巳亥十年少陰司天左太陰右厥陰陽明在泉左太陽右少陽是為火燥司子午十年太陰司天左少陽右少陰太陽在泉左厥陰右陽明是為濕寒司丑未十年少陽司天左陽明右太陰厥陰在泉左少陰右太陽是為火風司寅申十年陽明司天左太陽右少陽少陰在泉左太陰右厥陰是為燥火司卯酉十年太陽司天左厥陰右陽明太陰在泉左少陽右少陰是為寒濕司辰戌十年陰陽五行中運年表第五六十年之中運以合化之五行為紀而以在天之十干分陰陽焉又以五音之太少分有餘不足焉經曰有餘而往不足隨之不足而往有餘從之而太過不及分焉甲丙戊庚壬陽年為太過乙丁己辛癸陰年為不及而太過不及仍以五行之合化者分焉土太過曰敦阜不及曰卑監金太過曰堅成不及曰從革水太過曰漫衍不及曰涸流木太過曰發生不及曰委和火太過曰赫曦不及曰伏明其於中運之太過而得天地之制不及而得天地之助則宮為正宮商為正商羽為正羽角為正角徵為正徵而曰備化曰審平曰敷和曰升明曰靜順者是無過不及而為平氣也陰陽五行中運年表第五六政六紀上中下年表第六每年司天主天令位在上司地主地化位在下而以歲運運行乎其中故曰中運以司天論之君火相火寒水常為陽年司天風木濕土燥金常為陰年司天而中運之陰陽隨之故但記逐年之司天即可知逐年之中運焉逐年司天曰厥少太少陽太前人每就地盤定位以掌指輪之於四指之根左行亥子醜寅四指之尖右行巳午未申而卯辰上行於寅巳之指酉戌下行於申亥之指以定三陰於亥位為厥子位為少醜位為太三陽於寅位為少卯位為陽辰位為太從巳至戌重見如前故但以巳亥起厥四言為訣而逐年司天之位一指其掌而瞭如矣六政六紀上中下年表第六客氣加臨主氣年表第七客氣以厥少太少陽太為步逐年遞遷者也主氣以厥少少太陽太為步常年不動者也客主之初氣皆始於地左惟主氣常年以厥陰為初氣而客氣則以逐年司天之前二位為初氣此客主之所以有加臨也若六步之位而亦以指掌輪之則中指尖為三氣根為終氣即司天在泉之位也無名指根為初氣尖為二氣即泉左天右之位也食指尖為四氣根為五氣即天左泉右之位也以初氣起地之左間一語為訣而客主六步皆可推矣向之言初終六氣者每以大寒為始從二分二至前後析之惟是疏解內經之義當即證以內經之文考六元正紀本篇帝問六氣主時客氣加臨之應而岐伯對以行有次止有位常以正月朔日平旦視之睹其位而知其所在則客主之氣皆當以正月之朔為始而以一年十二月分之為最合錢塘高土宗世栻嘗言之是可從也或以為司天之交替與六氣之初終即以二十四氣論之亦當始於立春必不始於大寒則揆諸六節臟象篇所云及其至也皆歸始春之旨說亦可從至有謂當從曆元始於冬至子之半者則其言似太迂矣客氣加臨主氣年表第七五運齊化兼化表第八凡陽年以中運五太為太過陰年以中運五少為不及其太過也則為我旺我旺則勝我者畏我之盛而反齊其化矣如太宮土運勝土之木反齊土化太商金運勝金之火反齊金化太羽水運勝水之土反齊水化太角木運勝木之金反齊木化太徵火運勝火之水反齊火化此即經所謂畏其旺反同其化也其不及則為我弱我弱則勝我者乘我之衰而來兼其化矣如少宮土運勝土之木來兼土化少商金運勝金之火來兼金化少羽水運勝水之土來兼水化少宮土運勝土之木來兼土化少角木運勝木之金來兼木化少徵火運勝火之水來兼火化此即經所謂乘其弱來同其化也齊謂以我化彼兼謂以彼化我也五運齊化兼化表第八天符歲會年表第九天符者中運與司天相應也故曰應天為天符如丁巳年木運上應風木司天之類凡十二年歲會者中運與年支相值也故曰承歲為歲直如丁卯年木運承木支之類凡八年太乙天符者運氣天氣歲氣三者皆合故曰三合為治如戊午年火運火支又見君火乙酉年金運金支又見燥金己丑己未年土運土支又見濕土之類凡四年同天符同歲會者中運與在泉符會而分陽年之太過者為同天符陰年之不及者為同歲會如甲辰年陽土運太陰在泉辛丑年陰水運太陽在泉之類各六年上天符十二年歲會八年太乙天符四年同天符同歲會各六年共為三十六年惟太乙之四年已在天符十二年中歲會之八年亦有四年在天符中故六元正紀只言二十四歲蓋謂天符十二年同天符同歲會亦合十二年不數太乙之天符及歲會之同於天符者各四年耳天符為執法歲會為行令太乙天符為貴人病之中貴人者重中執法者亦重中行令者為輕六元紀曰知迎知隨氣可與期此之謂也天符歲會年表第九運氣中上順逆年表第十五運行大論曰氣有相得者有不相得者其相得則為順化如木臨火運火臨土運土臨金運金臨水運水臨木運司天生運也六十年中有此十二年之順化不相得則為天刑如木臨土運土臨水運水臨火運火臨金運金臨木運是司天克運也六十年中有此十二年之天刑其有氣雖相得而以母居子下謂之小逆如火運遇土木運遇火水運遇木金運遇水土運遇金是運生司天也六十年中有此十二年之小逆其有氣本不相得而又子居父上謂之不和如木運遇土火運遇金土運遇水金運遇木水運遇火是運克司天也六十年中有此十二年之不和若夫中運與司天同行則為平氣如巳亥之丁年丑未之己年卯酉之乙年辰戌之丙年子午寅申之戊年此即應天曰天符之十二年而六十年之為運周矣運氣中上順逆年表第十六元本標中氣治法表第十一經以火燥寒風熱濕六元為本以少陽太厥少太六經為標以臟腑表裡之互相為絡見於本標之中者為中氣故火為少陽本氣而少陽為氣之標燥為陽明本氣而陽明為氣之標寒為太陽本氣而太陽為氣之標風為厥陰本氣而厥陰為氣之標熱為少陰本氣而少陰為氣之標濕為太陰本氣而太陰為氣之標本者六元也標者六經也六元為六經之本始六經即六元所標著經恐人即以標為本失其治要故不曰標之氣而曰氣之標明乎治之所重在氣之本始不在氣所標著也前人另求標氣轉謂經未明言標義若以原文氣之標也之也字一作耳字解則盡得之矣至於中氣之治獨在陽明與厥陰兩經者熟玩經文當於火濕之分別有理會也六元本標中氣治法表第十一五行勝復表第十二諺云木火土金水五行周而復始互相生金水木火土五賊周而復始互相剋一若五行之只可有生不可有克者然而非克不生經所以言亢害承製制則生化也夫欲知五行之生克必先明五臟之子母如腎為肝母心為肝子肝為心母脾為心子心為脾母肺為脾子脾為肺母腎為肺子肺為腎母肝為腎子己不務德而侮其所勝則所勝之子來復母仇所勝妄行則己受其侮而所生之子亦往復之此太過不及之所以皆有勝而有復也因兩存之為實則瀉子之治並附以子失母蔭亦來復者兼以明虛則補母之義焉五行勝復表第十二司天在泉勝復補瀉合表第十三人謂素問為無方之書余謂素問即有方之始運氣七篇不名一藥而六味之酸苦辛甘咸淡四氣之寒熱溫涼取以入各臟而分補瀉者皆藥也即皆方也後人所賴以知何味何氣治何等病者蓋即此無方之書也乃至今日而人皆曰此是古書不治今病於是而今人之所謂補非即古人所謂補矣今人之所謂瀉非即古人所謂瀉矣古有以溫補涼瀉熱補寒瀉者即有以涼補溫瀉寒補熱瀉者其於味也亦然豈是見寒即為瀉見溫即為補乎亦豈見甘即為補見苦即為瀉乎今之以苦寒伐胃甘寒益腎為辭者非特於宜瀉者不敢瀉且敢於宜補者而反瀉之五臟苦欲之不講遂並氣味補瀉之無別而曰即可以治病也余未之敢信焉今以七篇中勝復之治匯而輯之歸於易簡而於六元正紀自甲子至癸亥所載藥食宜者及其他之與此略同者不更贅焉所以避繁複也厥陰風化司天平以辛涼佐以苦甘以甘緩之酸瀉之清勝治以酸溫佐以甘苦在泉治以辛涼佐以苦甘以甘緩之辛散之清勝治以酸溫佐以苦甘以辛平之厥陰客以辛補之酸瀉之甘緩之木之主其瀉以酸補以辛厥陰勝治以甘清佐以苦辛以酸瀉之厥陰復治以酸寒佐以甘辛以酸瀉之甘緩之少陰熱化司天平以鹹寒佐以苦甘以酸收之寒勝治以甘溫佐以苦酸辛在泉治以鹹寒佐以甘苦以酸收之苦發之寒勝治以甘熱佐以苦辛以鹹平之少陰客以咸補之甘瀉之酸收之火之主其瀉以甘補以咸少陰勝治以辛寒佐以苦鹹以甘瀉之少陰復治以鹹寒佐以苦辛以甘瀉之以酸收之辛苦發之咸軟之太陰濕化司天平以苦熱佐以酸辛以苦燥之淡泄之濕上甚而為熱治以苦溫佐以甘辛以汗為故而止熱勝治以苦寒佐以苦酸在泉治以苦熱佐以酸淡以苦燥之淡泄之熱勝治以苦冷佐以鹹甘以苦平之太陰客以甘補之苦瀉之甘緩之土之主其瀉以苦補以甘太陰勝治以咸熱佐以辛甘以苦瀉之太陰復治以苦熱佐以酸辛以苦瀉之燥之泄之少陽火化司天平以酸冷佐以苦甘以酸收之苦發之酸復之寒勝治以甘熱佐以苦辛在泉治以鹹冷佐以苦辛以酸收之苦發之寒勝治以甘熱佐以苦辛以鹹平之少陽客以咸補之甘瀉之咸軟之火之主其瀉以甘補以咸少陽勝治以辛寒佐以甘鹹以甘瀉之少陽復治以鹹冷佐以苦辛以咸軟之酸收之辛苦發之陽明燥化司天平以苦溫佐以酸辛以苦下之熱勝治以辛寒佐以苦甘在泉治以苦溫佐以甘辛以苦下之熱勝治以平寒佐以苦甘以酸平之陽明客以酸補之辛瀉之苦泄之金之主其瀉以辛補以酸陽明勝治以酸溫佐以辛甘以苦泄之陽明覆治以辛溫佐以苦甘以苦泄之下之酸補之太陽寒化司天平以辛熱佐以甘苦以咸瀉之熱勝治以鹹冷佐以苦辛在泉治以甘熱佐以苦辛以咸瀉之辛潤之苦堅之熱勝治以鹹冷佐以甘辛以苦平之太陽客以苦補之咸瀉之苦堅之辛潤之水之主其瀉以咸補以苦太陽勝治以甘熱佐以辛酸以咸瀉之太陽復治以咸熱佐以甘辛以苦堅之
